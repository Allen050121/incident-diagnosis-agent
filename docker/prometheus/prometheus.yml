global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'order-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['192.168.85.1:9081']

  - job_name: 'inventory-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['192.168.85.1:9082']

  - job_name: 'payment-mock-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['192.168.85.1:9083']
