server:
  port: 9081

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://192.168.85.66:3306/incident_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: 192.168.85.66
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  file:
    name: ${LOG_DIR:D:/yangjw/workspace/incident-diagnosis-agent/logs}/order-service.log
  level:
    com.example.incident: DEBUG

fault:
  enabled: true
